move_control_node:
  ros__parameters:
    speeds:
      forward: 100
      reverse: -0.100
      turn: 0.5
    watchdog_timeout: 10.0
    gestures:
      Pointing_Up: forward
      Victory: reverse
      Open_Palm: stop
      Closed_Fist: stop
      Thumb_Up_Left: turn_left
      Thumb_Up_Right: turn_right
      Thumb_Down: ""
      ILoveYou: ""
      None: ""

emergency_brake_node:
  ros__parameters:
    safe_distance: 0.3
