<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MediaPipe Hands POC</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <p class="kicker">Baseline Imaging Test</p>
          <h1>MediaPipe Hands</h1>
        </div>
        <div class="action-row">
          <span id="statusText" class="status-chip" data-state="idle">Idle</span>
          <button id="startButton" class="primary-button">Start Camera</button>
          <button id="fileButton" class="secondary-button">Open Video File</button>
          <input type="file" id="fileInput" accept="video/*" style="display: none" />
          <button id="stopButton" class="secondary-button" disabled>Stop</button>
        </div>
      </header>

      <section class="workspace">
        <div class="video-stage">
          <video class="input_video" playsinline></video>
          <canvas class="output_canvas"></canvas>
        </div>

        <aside class="control-panel">
          <div class="panel-heading">
            <h2>Settings</h2>
          </div>

          <label class="toggle-row" for="gestureDetection">
            <span>Gesture detection</span>
            <input id="gestureDetection" type="checkbox" />
          </label>

          <div class="control-row compact-row" aria-live="polite">
            <span>Recognizer</span>
            <span id="gestureResultValue" class="control-value">Off</span>
          </div>

          <div id="gestureResults" class="gesture-results" aria-live="polite">
            <div class="gesture-empty">Enable gesture detection to see per-hand results.</div>
          </div>

          <label class="control-row" for="maxHands">
            <span>Max hands</span>
            <span id="maxHandsValue" class="control-value">2</span>
          </label>
          <input id="maxHands" type="range" min="1" max="4" step="1" value="2" />

          <label class="control-row" for="minDetectionConfidence">
            <span>Detection confidence</span>
            <span id="minDetectionConfidenceValue" class="control-value">0.50</span>
          </label>
          <input
            id="minDetectionConfidence"
            type="range"
            min="0.1"
            max="0.9"
            step="0.05"
            value="0.5"
          />

          <label class="control-row" for="minTrackingConfidence">
            <span>Tracking confidence</span>
            <span id="minTrackingConfidenceValue" class="control-value">0.50</span>
          </label>
          <input
            id="minTrackingConfidence"
            type="range"
            min="0.1"
            max="0.9"
            step="0.05"
            value="0.5"
          />
        </aside>
      </section>
    </main>
  </body>
</html>
